<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ตั้งค่าโปรไฟล์ - Geometry Leo Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

<body>
    <main class="page-shell profile-shell">
        <a class="page-back" href="profile.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
            ย้อนกลับไปยังโปรไฟล์
        </a>

        <section class="profile-header">
            <div>
                <h1>การตั้งค่าโปรไฟล์</h1>
                <p>แก้ไขชื่อและรูปโปรไฟล์ของคุณได้ที่หน้านี้ ข้อมูลจะบันทึกไว้ในเครื่องทันที</p>
            </div>
        </section>

        <section class="profile-content">
            <div class="profile-card">
                <label for="usernameInput">ชื่อผู้ใช้</label>
                <input id="usernameInput" type="text" placeholder="กรอกชื่อของคุณ" />
            </div>

                <label>ธีมโปรไฟล์</label>

                    <button type="button" class="avatar-option" data-theme="sunset">
                        <span></span>
                        <span>Sunset</span>
                    </button>
                    <button type="button" class="avatar-option" data-theme="wave">
                        <span></span>
                        <span>Wave</span>
                    </button>
                    <button type="button" class="avatar-option" data-theme="emerald">
                        <span></span>
                        <span>Emerald</span>
                    </button>
                    <button type="button" class="avatar-option" data-theme="rose">
                        <span></span>
                        <span>Rose</span>
                    </button>
                </div>
            </div> -->

            <div class="profile-card exp-row">
                <button class="primary-button" id="saveSettings">บันทึกการตั้งค่า</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
    <script type="module" src="auth.js"></script>
    <script src="settings.js"></script>
