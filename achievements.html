<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ความสำเร็จ - Geometry Leo Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="page-shell">
        <a class="page-back" href="index.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
            กลับสู่เมนูหลัก
        </a>

        <h1>ความสำเร็จ</h1>
        <p>สำรวจความก้าวหน้าและรางวัลที่คุณได้ปลดล็อกในเกม</p>

        <div class="achievement-list">
            <article class="achievement-card">
                <div>
                    <strong>นักสำรวจเบื้องต้น</strong>
                    <p class="achievement-meta">ปลดล็อกเมื่อเข้าเรียน 5 ครั้ง</p>
                </div>
                <span class="achievement-status">สำเร็จ</span>
            </article>
            <article class="achievement-card">
                <div>
                    <strong>สายฟ้าทักษะ</strong>
                    <p class="achievement-meta">ผ่าน 3 ด่านแรกโดยไม่พลาด</p>
                </div>
                <span class="achievement-status">รอดำเนินการ</span>
            </article>
            <article class="achievement-card">
                <div>
                    <strong>ผู้พิชิตเรขาคณิต</strong>
                    <p class="achievement-meta">เก็บแต้มครบ 5,000 คะแนน</p>
                </div>
                <span class="achievement-status">รอดำเนินการ</span>
            </article>
        </div>
    </main>
