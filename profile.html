<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>โปรไฟล์ - Geometry Leo Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="page-shell profile-shell">
        <a class="page-back" href="index.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
            กลับสู่หน้าเริ่มต้น
        </a>

        <section class="profile-banner">
            <div class="profile-avatar">
                <label for="avatarUpload" class="avatar-upload-label" title="คลิกเพื่อเปลี่ยนรูปโปรไฟล์">
                    <div class="avatar-ring">
                        <div class="avatar-image" id="profileAvatar"></div>
                    </div>
                    <div class="avatar-edit-button">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                    </div>
                </label>
                <input type="file" id="avatarUpload" hidden accept="image/*"/>
                <div class="profile-details">
                    <p class="profile-name" id="profileName">###</p>
                    <div class="rank-chip">
                        <span>RANK: <strong id="profileRank">ผู้เชี่ยวชาญ</strong></span>
                    </div>
                </div>
            </div>
            <!-- <div class="profile-meta">
                <p class="profile-title" id="profileTitle">MASTER OF LOGIC</p>
            </div> -->
            <div class="profile-actions">
                <a href="settings.html" class="top-button settings-button">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    การตั้งค่า
                </a>
                <a href="leaderboard.html" class="top-button">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 15h1.5a2.5 2.5 0 0 1 0 5H4"/><path d="M18 15h1.5a2.5 2.5 0 0 0 0 5H18"/><path d="M12 6V3"/><path d="M12 21v-3"/><path d="M12 12a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M12 18a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/></svg>
                    กระดานผู้นำ
                </a>
            </div>
        </section>

        <section class="profile-stats">
            <div class="stat-card stat-card-highlight">
                <span>คะแนนสะสม</span>
                <strong id="pointsValue">0</strong>
            </div>
            <div class="stat-card">
                <span>อันดับปัจจุบัน</span>
                <strong id="rankPosition">#42</strong>
            </div>
            <div class="stat-card">
                <span>ต่อเนื่อง</span>
                <strong id="streakValue">0 วัน</strong>
            </div>
        </section>

        <section class="level-panel">
            <div class="level-panel-header">
                <span>เลเวล <strong id="profileLevel">1</strong></span>
                <span id="profileExp">45 / 100 EXP</span>
            </div>
            <div class="level-track">
                <div class="level-fill" id="levelFill"></div>
            </div>
        </section>

        <!-- <section class="profile-content">
            <div class="profile-card profile-edit">
                <div class="profile-card-title">ข้อมูลผู้ใช้</div>
                <div class="profile-row">
                    <span>ชื่อผู้ใช้</span>
                    <strong id="profileNameDetail">สมชาย เรขาคณิต</strong>
                </div>
            </div>
        </section> -->

        <!-- <section class="achievement-row">
            <div class="profile-card achievement-section">
                <div class="section-header">
                    <h2>ความสำเร็จล่าสุด</h2>
                </div>
                <div class="achievement-list" id="achievementList"></div>
            </div>
        </section> -->
    </main>

    <script src="script.js"></script>
    <script src="profile.js"></script>
</body>
</html>
